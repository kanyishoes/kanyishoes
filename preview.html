<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kanye Series | Product</title>


<script src="https://cdn.tailwindcss.com"></script>


<!-- Font Awesome Icons -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


<!-- Swiper -->

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>


</head>


<body class="bg-gray-100">


<!-- TOP NAV -->

<header class="bg-white shadow-md fixed top-0 w-full z-50">

<div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">


<h1 class="text-2xl font-bold text-blue-950">
Kanye Series
</h1>


<div class="flex gap-5 text-blue-950 text-xl">

<i class="fas fa-heart"></i>

<div class="relative">

<i class="fas fa-shopping-cart"></i>

<span
class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full px-1">

0

</span>

</div>


</div>


</div>

</header>


<div class="h-20"></div>



<!-- PRODUCT SECTION -->


<section class="max-w-7xl mx-auto px-4 py-6">


<div class="grid lg:grid-cols-2 gap-10">



<!-- IMAGE GALLERY -->


<div>


<div class="bg-white rounded-3xl overflow-hidden shadow">


<img
id="mainImage"
src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1200"
class="w-full h-[420px] object-cover">


</div>



<div class="grid grid-cols-4 gap-3 mt-4">


<img
onclick="changeImage(this)"
src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"
class="h-20 rounded-xl object-cover cursor-pointer">


<img
onclick="changeImage(this)"
src="https://images.unsplash.com/photo-1495555961986-6d4c1ecb7be3?w=500"
class="h-20 rounded-xl object-cover cursor-pointer">


<img
onclick="changeImage(this)"
src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=500"
class="h-20 rounded-xl object-cover cursor-pointer">


<img
onclick="changeImage(this)"
src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=500"
class="h-20 rounded-xl object-cover cursor-pointer">


</div>


</div>




<!-- PRODUCT DETAILS -->


<div class="bg-white rounded-3xl p-6 shadow">


<div class="flex justify-between">


<h1 class="text-3xl font-bold text-blue-950">

Nike Air Max

</h1>


<button
class="text-2xl text-gray-400 hover:text-red-500">

<i class="fas fa-heart"></i>

</button>


</div>


<!-- Price -->


<h2 class="text-3xl font-bold text-blue-900 mt-5">

UGX 120,000

</h2>



<p class="text-gray-600 mt-5">

Premium quality shoes designed for comfort,
style and everyday performance.

</p>



<!-- Stock -->


<div class="mt-5">

<span class="bg-green-100 text-green-700 px-4 py-2 rounded-full text-sm">

In Stock

</span>


</div>



<!-- Quantity -->


<div class="flex items-center gap-4 mt-6">


<button
class="w-10 h-10 bg-gray-200 rounded-lg">

-

</button>


<span class="font-bold text-xl">

1

</span>


<button
class="w-10 h-10 bg-blue-900 text-white rounded-lg">

+

</button>


</div>




<!-- Buttons -->


<div class="grid md:grid-cols-2 gap-4 mt-8">


<button
class="bg-blue-900 text-white py-4 rounded-xl font-semibold hover:bg-blue-800">

<i class="fas fa-cart-plus mr-2"></i>

Add To Cart

</button>



<button
class="bg-gray-200 text-blue-950 py-4 rounded-xl font-semibold">

Buy Now

</button>


</div>



</div>


</div>


</section>


        <!-- MOBILE BOTTOM NAV -->
        <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white shadow-[0_-4px_20px_rgba(0,0,0,0.08)] border-t z-30">
            <div class="flex justify-around py-3 px-2">
                <a href="./index.html" class="flex flex-col items-center text-gray-500 hover:text-blue-700 transition p-2">
                    <i class="fas fa-house text-2xl"></i>
                    <span class="text-xs mt-1 font-semibold">Home</span>
                </a>
                <a href="#products" class="flex flex-col items-center text-blue-900 transition p-2">
                    <i class="fas fa-store text-2xl"></i>
                    <span class="text-xs mt-1 font-semibold">Shop</span>
                </a>
                <a href="./orders.html" class="flex flex-col items-center text-gray-500 hover:text-blue-700 transition p-2">
                    <i class="fas fa-bag-shopping text-2xl"></i>
                    <span class="text-xs mt-1 font-semibold">Orders</span>
                </a>
                <a href="./profile.html" class="flex flex-col items-center text-gray-500 hover:text-blue-700 transition p-2">
                    <i class="fas fa-user text-2xl"></i>
                    <span class="text-xs mt-1 font-semibold">Profile</span>
                </a>
            </div>
        </nav>

        <!-- Mobile Bottom Spacing -->
        <div class="lg:hidden h-20"></div>


<script>

function changeImage(element){

document.getElementById("mainImage").src = element.src;

}

</script>



</body>

</html>
