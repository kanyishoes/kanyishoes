<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Orders | Kanye Series</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body class="bg-gray-100">

    <!-- Header -->

    <header class="bg-blue-950 text-white shadow-lg sticky top-0 z-50">

        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

            <h1 class="text-2xl font-bold">

                My Orders

            </h1>

            <button>

                <i class="fas fa-search text-xl"></i>

            </button>

        </div>

    </header>

    <!-- Container -->

    <main class="max-w-7xl mx-auto px-4 py-6">

        <!-- Status Filter -->

        <div class="flex gap-3 overflow-x-auto pb-2">

            <button
                class="px-5 py-2 rounded-full bg-blue-900 text-white whitespace-nowrap">

                All

            </button>

            <button
                class="px-5 py-2 rounded-full bg-white shadow whitespace-nowrap">

                Pending

            </button>

            <button
                class="px-5 py-2 rounded-full bg-white shadow whitespace-nowrap">

                Processing

            </button>

            <button
                class="px-5 py-2 rounded-full bg-white shadow whitespace-nowrap">

                Delivered

            </button>

        </div>

        <!-- Orders -->

        <div class="space-y-6 mt-8">

            <!-- Card -->

            <div class="bg-white rounded-3xl shadow-lg p-5">

                <div class="flex justify-between">

                    <div>

                        <p class="text-gray-500">

                            Order #

                        </p>

                        <h3 class="font-bold">

                            KS240701

                        </h3>

                    </div>

                    <span
                        class="bg-green-100 text-orange-700 px-3 py-1 rounded-full">

                        Approved

                    </span>

                </div>

                <div class="flex gap-4 mt-5">

                    <img
                        src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"
                        class="w-24 h-24 rounded-xl object-cover">

                    <div class="flex-1">

                        <h4 class="font-semibold">

                            Nike Air Max

                        </h4>

                        <p class="text-gray-500">

                            Qty : 2

                        </p>

                        <h3
                            class="font-bold text-blue-900 mt-2">

                            UGX 240,000

                        </h3>

                    </div>

                </div>

                <div
                    class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-6">

                    <button
                        class="bg-gray-200 py-3 rounded-xl">

                        Buy Again

                    </button>

                    <button
                        class="bg-red-500 text-white py-3 rounded-xl">

                        Cancel

                    </button>

                </div>

            </div>
            <div class="bg-white rounded-3xl shadow-lg p-5">

                <div class="flex justify-between">

                    <div>

                        <p class="text-gray-500">

                            Order #

                        </p>

                        <h3 class="font-bold">

                            KS240701

                        </h3>

                    </div>

                    <span
                        class="bg-green-100 text-green-700 px-3 py-1 rounded-full">

                        Delivered

                    </span>

                </div>

                <div class="flex gap-4 mt-5">

                    <img
                        src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"
                        class="w-24 h-24 rounded-xl object-cover">

                    <div class="flex-1">

                        <h4 class="font-semibold">

                            Nike Air Max

                        </h4>

                        <p class="text-gray-500">

                            Qty : 2

                        </p>

                        <h3
                            class="font-bold text-blue-900 mt-2">

                            UGX 240,000

                        </h3>

                    </div>

                </div>

                <div
                    class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-6">

                    <button
                        class="bg-gray-200 py-3 rounded-xl">

                        Buy Again

                    </button>

                    <button
                        class="bg-red-500 text-white py-3 rounded-xl">

                        Cancel

                    </button>

                </div>

            </div>
            <div class="bg-white rounded-3xl shadow-lg p-5">

                <div class="flex justify-between">

                    <div>

                        <p class="text-gray-500">

                            Order #

                        </p>

                        <h3 class="font-bold">

                            KS240701

                        </h3>

                    </div>

                    <span
                        class="bg-green-100 text-gray-700 px-3 py-1 rounded-full">

                        Pendding

                    </span>

                </div>

                <div class="flex gap-4 mt-5">

                    <img
                        src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"
                        class="w-24 h-24 rounded-xl object-cover">

                    <div class="flex-1">

                        <h4 class="font-semibold">

                            Nike Air Max

                        </h4>

                        <p class="text-gray-500">

                            Qty : 2

                        </p>

                        <h3
                            class="font-bold text-blue-900 mt-2">

                            UGX 240,000

                        </h3>

                    </div>

                </div>

                <div
                    class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-6">

                    <button
                        class="bg-gray-200 py-3 rounded-xl">

                        Buy Again

                    </button>

                    <button
                        class="bg-red-500 text-white py-3 rounded-xl">

                        Cancel

                    </button>

                </div>

            </div>

        </div>

        <!-- Empty State -->

        <div class="hidden text-center mt-20">

            <i class="fas fa-box-open text-6xl text-gray-300"></i>

            <h2 class="text-2xl font-bold mt-6">

                No Orders Yet

            </h2>

            <p class="text-gray-500 mt-3">

                Your purchases will appear here.

            </p>

            <button
                class="mt-6 bg-blue-900 text-white px-6 py-3 rounded-xl">

                Start Shopping

            </button>

        </div>

    </main>
    <!-- MOBILE BOTTOM NAV -->
        <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white shadow-[0_-4px_20px_rgba(0,0,0,0.08)] border-t z-30">
            <div class="flex justify-around py-3 px-2">
                <a href="./index.html" class="flex flex-col items-center text-gray-500 hover:text-blue-700 transition p-2">
                    <i class="fas fa-house text-2xl"></i>
                    <span class="text-xs mt-1 font-semibold">Home</span>
                </a>
                <a href="./products.html" class="flex flex-col items-center text-gray-500 transition p-2">
                    <i class="fas fa-store text-2xl"></i>
                    <span class="text-xs mt-1 font-semibold">Shop</span>
                </a>
                <a href="#orders" class="flex flex-col items-center text-blue-900 hover:text-blue-700 transition p-2">
                    <i class="fas fa-bag-shopping text-2xl"></i>
                    <span class="text-xs mt-1 font-semibold">Orders</span>
                </a>
                <a href="./profile.html" class="flex flex-col items-center text-gray-500 hover:text-blue-700 transition p-2">
                    <i class="fas fa-user text-2xl"></i>
                    <span class="text-xs mt-1 font-semibold">Profile</span>
                </a>
            </div>
        </nav>

        <!-- Mobile Bottom Spacing -->
        <div class="lg:hidden h-20"></div>

</body>

</html>
