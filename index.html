<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANYI Shoes</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Swiper -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <link rel="stylesheet" href="/css/home.css">
</head>
<body>

    <!-- TOP NAV -->
    <header class="top-nav">
        <div class="logo">
            KANYI
        </div>

        <div class="nav-icons">
            <button><i class="bi bi-search"></i></button>

            <button class="icon-badge">
                <i class="bi bi-heart-fill"></i>
                <span>2</span>
            </button>

            <button class="icon-badge">
                <i class="bi bi-cart3"></i>
                <span>3</span>
            </button>
        </div>
    </header>

    <!-- HERO SLIDER -->
    <section class="hero-section">

        <div class="swiper heroSwiper">
            <div class="swiper-wrapper">

                <div class="swiper-slide">
                    <img src="https://images.unsplash.com/photo-1556906781-9a412961c28c?w=1200"
                        alt="Jordan">

                    <div class="overlay">
                        <h2>Jordan Collection</h2>
                        <p>Step Into Greatness</p>
                        <button>Shop Now</button>
                    </div>
                </div>

                <div class="swiper-slide">
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1200"
                        alt="Nike">

                    <div class="overlay">
                        <h2>Nike Collection</h2>
                        <p>Performance Meets Style</p>
                        <button>Shop Now</button>
                    </div>
                </div>
